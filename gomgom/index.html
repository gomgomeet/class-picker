<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>곰곰 플래너</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B8043">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="곰곰플래너">
<style>
  :root{
    --green:#0B8043; --green-soft:#E6F4EA; --green-deep:#095F32;
    --amber:#F9AB00; --amber-soft:#FEF7E0;
    --ink:#202124; --dim:#5F6368; --line:#E8EAED; --bg:#FFFFFF;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.5;overflow-x:hidden}
  .wrap{max-width:560px;margin:0 auto;min-height:100%}

  /* ── 그린 헤더 + 주간 그리드 ── */
  header{background:var(--green);color:#fff;padding:18px 20px 12px;position:sticky;top:0;z-index:20}
  header .top{display:flex;justify-content:space-between;align-items:baseline}
  header b{font-size:18px;font-weight:700}
  header .ym{font-size:12.5px;opacity:.85}
  .week{display:flex;gap:5px;margin-top:12px;padding-bottom:2px}
  .day{flex:1;text-align:center;color:#CFEBD9;font-size:11px;padding:7px 0 6px;border-radius:10px;
    border:0;background:transparent;font-family:inherit;cursor:pointer}
  .day b{display:block;font-size:15px;color:#fff;margin-top:2px;font-variant-numeric:tabular-nums}
  .day.today{outline:1.5px solid #ffffff66}
  .day.on{background:#fff;color:var(--green)}
  .day.on b{color:var(--green)}

  main{padding:16px 18px calc(110px + var(--safe-b))}
  h2{font-size:12.5px;color:var(--dim);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
  h2 em{font-style:normal;color:#9AA0A6;font-weight:400;margin-left:auto;font-size:11.5px}
  .empty{color:#9AA0A6;font-size:12.5px;text-align:center;padding:14px 0}

  /* ── 이벤트 카드 ── */
  .ev{display:flex;gap:10px;margin-bottom:8px}
  .ev .c{width:4px;border-radius:4px;background:var(--green);flex:0 0 auto}
  .ev .bx{flex:1;background:var(--green-soft);border-radius:10px;padding:10px 12px;min-width:0}
  .ev.ins .c{background:var(--amber)}
  .ev.ins .bx{background:var(--amber-soft)}
  .ev b{display:block;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .ev s{all:unset;font-size:11.5px;color:var(--dim)}
  .ev .tm{float:right;font-size:12px;color:var(--green);font-variant-numeric:tabular-nums;margin-left:8px}
  .ev.ins .tm{color:var(--amber)}
  .acts{display:none;gap:8px;margin-top:8px}
  .ev.open .acts{display:flex}
  .acts button{border:0;background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;
    font-weight:600;color:var(--dim);cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(32,33,36,.15)}
  .acts .del{color:#C5221F;margin-left:auto}

  /* ── 플로팅 녹음 버튼 ── */
  .rec{position:fixed;right:20px;bottom:calc(24px + var(--safe-b));width:60px;height:60px;border-radius:18px;
    background:var(--green);color:#fff;font-size:25px;border:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(11,128,67,.35);z-index:30}
  .rec:active{transform:scale(.95)}

  /* ── 녹음 시트 ── */
  .sheet-bg{position:fixed;inset:0;background:rgba(32,33,36,.45);z-index:40;display:none}
  .sheet-bg.show{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;z-index:50;
    max-width:560px;margin:0 auto;padding:20px 20px calc(20px + var(--safe-b));display:none}
  .sheet.show{display:block}
  .sheet h3{font-size:14px;display:flex;align-items:center;gap:8px}
  .sheet h3 .st{font-size:11.5px;color:var(--dim);font-weight:400}
  .sheet h3 .st.live{color:#C5221F}
  .sheet textarea{width:100%;border:1px solid var(--line);border-radius:12px;margin:12px 0;
    padding:12px;font-family:inherit;font-size:15px;line-height:1.55;min-height:96px;resize:none;outline:none}
  .sheet textarea:focus{border-color:var(--green)}
  .dest{display:flex;gap:10px}
  .dest button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px 8px;
    font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)}
  .dest .ins{border-color:var(--amber)}
  .dest .dia{border-color:var(--green)}
  .dest button.hint{color:#fff}
  .dest .ins.hint{background:var(--amber);border-color:var(--amber)}
  .dest .dia.hint{background:var(--green);border-color:var(--green)}
  .dest button small{display:block;font-size:10.5px;font-weight:400;margin-top:2px;opacity:.75}
  .sheet .cancel{width:100%;border:0;background:none;color:var(--dim);font-size:13px;
    margin-top:12px;cursor:pointer;font-family:inherit}

  footer{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;z-index:25;
    padding:8px 20px calc(8px + var(--safe-b));display:flex;gap:16px;
    background:linear-gradient(transparent,#fff 40%);font-size:12px}
  footer button{border:0;background:none;color:#9AA0A6;font-size:12px;cursor:pointer;font-family:inherit}
  footer button:hover{color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="top"><b>🐻 곰곰 플래너</b><span class="ym" id="ym"></span></div>
    <div class="week" id="week"></div>
  </header>
  <main>
    <h2>📓 다이어리 저장 결과 <em id="cntD"></em></h2>
    <div id="listD"></div>
    <h2>💡 인사이트 저장 결과 <em id="cntI"></em></h2>
    <div id="listI"></div>
  </main>
  <footer>
    <button id="expCsv">노션용 CSV</button>
    <button id="expJson">백업</button>
    <button id="imp">가져오기</button>
    <input type="file" id="impFile" accept="application/json" hidden>
  </footer>
  <button class="rec" id="rec" aria-label="녹음">🎙</button>

  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet">
    <h3>🎙 말한 내용 <span class="st" id="sheetSt"></span></h3>
    <textarea id="ta" placeholder="말하면 여기에 글로 적혀요. 직접 입력도 됩니다."></textarea>
    <div class="dest">
      <button class="ins" id="saveIns">💡 인사이트로 저장<small>노션 Inbox · 인사이트</small></button>
      <button class="dia" id="saveDia">📓 일정·다이어리로 저장<small>정리 시 📅 캘린더 동시 등록</small></button>
    </div>
    <button class="cancel" id="cancel">닫기</button>
  </div>
</div>

<script>
const KEY="insight-app-v1";
let items=load(), dayFilter=null;
items.forEach(i=>{if(i.status==="inbox"||i.status==="보관"||i.status==="건강기록")i.status="인사이트";});

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(items))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function when(ts){const d=new Date(ts),n=new Date();
  const same=(a,b)=>a.toDateString()==b.toDateString();
  const t=d.toTimeString().slice(0,5);
  if(same(d,n))return t;
  const y=new Date(n);y.setDate(n.getDate()-1);
  if(same(d,y))return "어제";
  return (d.getMonth()+1)+"/"+d.getDate();}

/* ── 주간 그리드 ── */
const DOW=["일","월","화","수","목","금","토"];
function weekDays(){
  const n=new Date(), mon=new Date(n);
  mon.setDate(n.getDate()-((n.getDay()+6)%7));   // 이번 주 월요일
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function renderWeek(){
  const n=new Date();
  document.getElementById("ym").textContent=`${n.getFullYear()}년 ${n.getMonth()+1}월`;
  const el=document.getElementById("week");
  el.innerHTML=weekDays().map(d=>{
    const key=d.toDateString(), today=key===n.toDateString();
    return `<button class="day ${today?"today":""} ${dayFilter===key?"on":""}" data-k="${key}">
      ${DOW[d.getDay()]}<b>${d.getDate()}</b></button>`;
  }).join("");
  el.querySelectorAll(".day").forEach(b=>b.onclick=()=>{
    dayFilter=(dayFilter===b.dataset.k)?null:b.dataset.k; render();});
}

/* ── 목록 ── */
function evHtml(i){
  const dia=i.status==="다이어리";
  const st=dia?"저장됨 · 정리 시 📅 캘린더 + 다이어리 등록":"✓ 저장됨 · CSV로 노션 Inbox 반영";
  return `<div class="ev ${dia?"":"ins"}" data-id="${i.id}">
    <div class="c"></div><div class="bx">
      <span class="tm">${when(i.ts)}</span><b>${esc(i.text)}</b><s>${st}</s>
      <div class="acts">
        <button data-sw>${dia?"💡 인사이트로 이동":"📓 다이어리로 이동"}</button>
        <button data-del class="del">삭제</button>
      </div>
    </div></div>`;
}
function render(){
  renderWeek();
  const match=i=>!dayFilter||new Date(i.ts).toDateString()===dayFilter;
  const dia=items.filter(i=>i.status==="다이어리"&&match(i));
  const ins=items.filter(i=>i.status==="인사이트"&&match(i));
  const f=dayFilter?" (선택한 날)":"";
  document.getElementById("cntD").textContent=dia.length+"건"+f;
  document.getElementById("cntI").textContent=ins.length+"건"+f;
  document.getElementById("listD").innerHTML=dia.map(evHtml).join("")||`<div class="empty">🎙 녹음에서 일정을 말하면 여기에 쌓여요</div>`;
  document.getElementById("listI").innerHTML=ins.map(evHtml).join("")||`<div class="empty">🎙 녹음으로 떠오른 생각을 담아 보세요</div>`;
  document.querySelectorAll(".ev").forEach(ev=>{
    const it=items.find(x=>x.id===ev.dataset.id);
    ev.querySelector(".bx").onclick=()=>ev.classList.toggle("open");
    ev.querySelector("[data-sw]").onclick=e=>{e.stopPropagation();
      it.status=it.status==="다이어리"?"인사이트":"다이어리";save();render();};
    ev.querySelector("[data-del]").onclick=e=>{e.stopPropagation();
      if(confirm("삭제할까요?")){items=items.filter(x=>x.id!==it.id);save();render();}};
  });
}

/* ── 녹음 시트 ── */
const sheet=document.getElementById("sheet"),sheetBg=document.getElementById("sheetBg"),
      ta=document.getElementById("ta"),sheetSt=document.getElementById("sheetSt"),
      recBtn=document.getElementById("rec");
const SCHED=/(\d{1,2}\s*시|\d{1,2}\s*:\s*\d{2}|오전|오후|내일|모레|다음\s*주|\d{1,2}\s*월\s*\d{1,2}\s*일|회의|상담|연수|행사|출장|마감|약속|협의회)/;
function suggest(){
  const isSched=SCHED.test(ta.value);
  document.getElementById("saveDia").classList.toggle("hint",isSched);
  document.getElementById("saveIns").classList.toggle("hint",!isSched&&ta.value.trim().length>0);
}
ta.addEventListener("input",suggest);
function openSheet(){sheet.classList.add("show");sheetBg.classList.add("show");}
function closeSheet(){sheet.classList.remove("show");sheetBg.classList.remove("show");
  ta.value="";suggest();stopRec();}
document.getElementById("cancel").onclick=closeSheet;
sheetBg.onclick=closeSheet;

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null;
function stopRec(){if(rec){try{rec.stop()}catch(e){}rec=null;}sheetSt.textContent="";sheetSt.classList.remove("live");}
recBtn.onclick=()=>{
  openSheet();
  if(!SR){sheetSt.textContent="이 브라우저는 음성 인식 미지원 — 직접 입력하세요";return;}
  const base=ta.value.trim();
  let finalText="";
  rec=new SR();rec.lang="ko-KR";rec.interimResults=true;rec.continuous=true;
  sheetSt.textContent="● 듣는 중…";sheetSt.classList.add("live");
  rec.onresult=e=>{let interim="";
    for(const r of e.results){r.isFinal?finalText+=r[0].transcript:interim+=r[0].transcript;}
    const spoken=(finalText+interim).trim();
    ta.value=base?(base+"\n"+spoken):spoken;
    suggest();};
  rec.onend=()=>{sheetSt.textContent="인식 종료 — 내용 확인 후 저장하세요";sheetSt.classList.remove("live");rec=null;};
  rec.onerror=()=>{sheetSt.textContent="인식 오류 — 직접 입력할 수 있어요";sheetSt.classList.remove("live");rec=null;};
  rec.start();
};
function saveAs(status){
  const text=ta.value.trim();if(!text)return;
  items.unshift({id:uid(),text,status,sources:["음성"],topics:[],outputs:[],link:"",ts:Date.now()});
  save();closeSheet();render();
}
document.getElementById("saveIns").onclick=()=>saveAs("인사이트");
document.getElementById("saveDia").onclick=()=>saveAs("다이어리");

/* ── 내보내기/가져오기 ── */
function download(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
document.getElementById("expCsv").onclick=()=>{
  const q=s=>`"${(s||"").replace(/"/g,'""')}"`;
  const CLS={"인사이트":"인사이트","다이어리":"오늘시작"};
  const head=["제목","분류","출처","요약","수신일"];
  const rows=items.map(i=>{
    const first=i.text.split("\n")[0];
    return [first.length>60?first.slice(0,60)+"…":first,CLS[i.status]||"기타",
      i.sources&&i.sources.includes("음성")?"voice":"직접입력",i.text,
      new Date(i.ts).toISOString().slice(0,10)].map(q).join(",");});
  download("gomgom-inbox.csv","﻿"+[head.join(","),...rows].join("\n"),"text/csv");
};
document.getElementById("expJson").onclick=()=>download("gomgom-backup.json",JSON.stringify(items,null,2),"application/json");
document.getElementById("imp").onclick=()=>document.getElementById("impFile").click();
document.getElementById("impFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(Array.isArray(d)){items=d.concat(items);save();render();alert(d.length+"개 가져왔어요.");}}
    catch(_){alert("JSON 파일이 아니에요.");}};
  r.readAsText(f);
};

/* ── 첫 실행 예시 ── */
if(items.length===0){
  items=[
    {id:uid(),text:"수학 모둠 발표, 짝 점검 방식이 효과적이었음",status:"인사이트",sources:["음성"],ts:Date.now()-3600e3},
    {id:uid(),text:"내일 10시 학년 협의회",status:"다이어리",sources:["음성"],ts:Date.now()-7200e3},
  ];save();
}
render();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
